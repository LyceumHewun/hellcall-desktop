name: Build And Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN != '' && secrets.RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD != '' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || secrets.TAURI_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Validate release and updater secrets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:RELEASE_TOKEN)) {
            throw 'Missing release token. Provide RELEASE_GITHUB_TOKEN or enable write permissions for GITHUB_TOKEN.'
          }

          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw 'Missing updater signing private key. Set either TAURI_SIGNING_PRIVATE_KEY or TAURI_PRIVATE_KEY in repository secrets.'
          }

      - name: Sync app version from tag
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ github.ref_name }}' -replace '^v', ''

          if (-not $version) {
            throw 'Could not derive version from tag name.'
          }

          $packageJsonPath = 'package.json'
          $packageJson = Get-Content $packageJsonPath | ConvertFrom-Json
          $packageJson.version = $version
          $packageJson | ConvertTo-Json -Depth 100 | Set-Content $packageJsonPath

          $tauriConfigPath = 'src-tauri/tauri.conf.json'
          $tauriConfig = Get-Content $tauriConfigPath | ConvertFrom-Json
          $tauriConfig.version = $version
          $tauriConfig | ConvertTo-Json -Depth 100 | Set-Content $tauriConfigPath

          $cargoTomlPath = 'src-tauri/Cargo.toml'
          $cargoToml = Get-Content $cargoTomlPath -Raw
          $cargoToml = [regex]::Replace(
            $cargoToml,
            '(?m)^version\s*=\s*"[^"]+"',
            "version = `"$version`"",
            1
          )
          Set-Content $cargoTomlPath $cargoToml

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Download Vosk runtime and import library
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $releases = Invoke-RestMethod -Uri 'https://api.github.com/repos/alphacep/vosk-api/releases'
          $asset = $null

          foreach ($release in $releases) {
            $asset = $release.assets |
              Where-Object { $_.name -match 'win64.*\.zip$' } |
              Select-Object -First 1

            if ($asset) {
              break
            }
          }

          if (-not $asset) {
            throw 'Could not find a Windows x64 Vosk release asset.'
          }

          $downloadDir = Join-Path $env:RUNNER_TEMP 'vosk-api'
          $zipPath = Join-Path $downloadDir $asset.name
          $extractPath = Join-Path $downloadDir 'extract'
          $targetDir = Join-Path $env:GITHUB_WORKSPACE 'src-tauri\lib'

          New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
          New-Item -ItemType Directory -Force -Path $extractPath | Out-Null
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          Get-ChildItem -Path $targetDir -Force -File |
            Where-Object { $_.Name -ne '.gitkeep' } |
            Remove-Item -Force -ErrorAction SilentlyContinue

          $voskRoot = Get-ChildItem -Path $extractPath -Recurse -Directory |
            Where-Object {
              (Test-Path (Join-Path $_.FullName 'libvosk.dll')) -and
              (Test-Path (Join-Path $_.FullName 'libvosk.lib'))
            } |
            Select-Object -First 1

          if (-not $voskRoot) {
            throw 'Could not find the extracted Vosk library directory containing both libvosk.dll and libvosk.lib.'
          }

          $voskFiles = Get-ChildItem -Path $voskRoot.FullName -File |
            Where-Object {
              $_.Name -in @(
                'libvosk.dll',
                'libvosk.lib',
                'libgcc_s_seh-1.dll',
                'libstdc++-6.dll',
                'libwinpthread-1.dll',
                'vosk_api.h'
              )
            }

          foreach ($file in $voskFiles) {
            Copy-Item -LiteralPath $file.FullName -Destination (Join-Path $targetDir $file.Name) -Force
          }

      - name: Build and publish Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ env.RELEASE_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Hellcall Desktop ${{ github.ref_name }}
          releaseBody: |
            See the assets to download and install this version.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: --bundles nsis
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true

  publish-updater-json:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate updater.json for GitHub Pages
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p pages
          node <<'NODE'
          const fs = require('node:fs');

          async function main() {
            const repo = process.env.GITHUB_REPOSITORY;
            const tag = process.env.GITHUB_REF_NAME;
            const token = process.env.GITHUB_TOKEN;

            const releaseResponse = await fetch(
              `https://api.github.com/repos/${repo}/releases/tags/${tag}`,
              {
                headers: {
                  Authorization: `Bearer ${token}`,
                  Accept: 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
              },
            );

            if (!releaseResponse.ok) {
              const responseBody = await releaseResponse.text();
              throw new Error(
                `Failed to fetch release metadata: ${releaseResponse.status} ${responseBody}`,
              );
            }

            const release = await releaseResponse.json();
            const assets = release.assets ?? [];

            const updaterAsset =
              assets.find(
                (asset) => /nsis/i.test(asset.name) && /setup\.exe$/i.test(asset.name),
              ) ??
              assets.find(
                (asset) => /setup\.exe$/i.test(asset.name) && !asset.name.endsWith('.sig'),
              ) ??
              assets.find(
                (asset) => /\.msi$/i.test(asset.name) && !asset.name.endsWith('.sig'),
              );

            if (!updaterAsset) {
              throw new Error(
                `Could not find the updater installer asset in release ${release.tag_name}.`,
              );
            }

            const sigAsset =
              assets.find((asset) => asset.name === `${updaterAsset.name}.sig`) ??
              assets.find(
                (asset) =>
                  asset.name.endsWith('.sig') &&
                  asset.name.replace(/\.sig$/i, '') === updaterAsset.name,
              );

            if (!sigAsset) {
              throw new Error(
                `Could not find the signature asset for ${updaterAsset.name} in release ${release.tag_name}.`,
              );
            }

            const sigResponse = await fetch(sigAsset.browser_download_url, {
              headers: {
                Accept: 'text/plain',
                Authorization: `Bearer ${token}`,
              },
            });

            if (!sigResponse.ok) {
              const responseBody = await sigResponse.text();
              throw new Error(
                `Failed to download signature asset ${sigAsset.name}: ${sigResponse.status} ${responseBody}`,
              );
            }

            const signature = (await sigResponse.text()).trim();
            const updaterManifest = {
              version: release.tag_name.replace(/^v/, ''),
              notes: release.body ?? '',
              pub_date: release.published_at ?? new Date().toISOString(),
              platforms: {
                'windows-x86_64': {
                  url: updaterAsset.browser_download_url,
                  signature,
                },
              },
            };

            fs.writeFileSync(
              'pages/updater.json',
              `${JSON.stringify(updaterManifest, null, 2)}\n`,
            );
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
